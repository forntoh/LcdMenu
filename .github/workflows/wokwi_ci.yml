name: Wokwi CI

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  push:
    branches:
      - master
  schedule:
    - cron: "15 3 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: wokwi-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  select-scenarios:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.select.outputs.mode }}
      count: ${{ steps.select.outputs.count }}
      names: ${{ steps.select.outputs.names }}
      matrix: ${{ steps.select.outputs.matrix }}
      should_run: ${{ steps.select.outputs.should_run }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Resolve run mode
        id: resolve-mode
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let mode = 'changed';

            if (eventName === 'push' || eventName === 'schedule' || eventName === 'workflow_dispatch') {
              mode = 'full';
            }

            if (eventName === 'pull_request_target') {
              const pr = context.payload.pull_request || {};
              const labels = (pr.labels || []).map((label) => label.name);
              const hasFullLabel = labels.includes('full-wokwi');
              if (hasFullLabel) {
                mode = 'full';
              } else if (pr.draft) {
                mode = 'skip';
              } else {
                mode = 'changed';
              }
            }

            core.info(`Resolved Wokwi mode: ${mode}`);
            core.setOutput('mode', mode);

      - name: Collect changed files
        id: changed-files
        if: github.event_name == 'pull_request_target' && steps.resolve-mode.outputs.mode == 'changed'
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100,
            });
            const changed = files.map((file) => file.filename);
            core.info(`Detected ${changed.length} changed file(s)`);
            core.setOutput('files', changed.join('\n'));

      - name: Persist changed file list
        run: |
          printf "%s\n" "${{ steps.changed-files.outputs.files }}" > /tmp/wokwi_changed_files.txt

      - id: select
        name: Select Wokwi scenarios
        run: |
          python3 .scripts/select_wokwi_matrix.py \
            --mode "${{ steps.resolve-mode.outputs.mode }}" \
            --smoke-scenarios "Basic,SubMenu,Widgets,MenuTimeout" \
            --changed-files-file /tmp/wokwi_changed_files.txt \
            --github-output "$GITHUB_OUTPUT"

      - name: Print selection summary
        run: |
          echo "Mode: ${{ steps.select.outputs.mode }}"
          echo "Scenario count: ${{ steps.select.outputs.count }}"
          echo "Scenarios: ${{ steps.select.outputs.names }}"

  run-ci:
    needs: select-scenarios
    if: needs.select-scenarios.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.select-scenarios.outputs.matrix) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare Example File
        run: |
          EXAMPLE_FILE=$(python .scripts/prepare_example.py ${{ matrix.example }})
          EXAMPLE_NAME=$(basename $EXAMPLE_FILE .cpp)
          echo "EXAMPLE_NAME=$EXAMPLE_NAME" >> $GITHUB_ENV
          cp $EXAMPLE_FILE src/main.cpp

          if [ -f "test/$EXAMPLE_NAME.test.yml" ]; then
            echo "TEST_FILE=test/$EXAMPLE_NAME.test.yml" >> $GITHUB_ENV
          fi
      - name: Prepare Test Script
        run: |
          TIMINGS="${{ vars.WOKWI_CI_TIMINGS }}"
          BUFFER="${{ vars.WOKWI_TIMEOUT_BUFFER }}"

          if [ -z "$TIMINGS" ]; then
            TIMINGS="300 150 150"
          fi

          if [ -z "$BUFFER" ]; then
            BUFFER="1000"
          fi

          RUN_DURATION=$(python .scripts/prepare_workflow.py ${{ env.TEST_FILE }} $TIMINGS)
          echo "RUN_DURATION=$((RUN_DURATION + BUFFER))" >> $GITHUB_ENV

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Install library dependencies
        run: pio lib install

      - name: Build PlatformIO
        run: pio run
        env:
          LOCAL_BUILD: 1
          
      - name: Run a Wokwi CI server
        uses: wokwi/wokwi-ci-server-action@v1

      - name: Running ${{ env.TEST_FILE }} on Wokwi
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          scenario: ${{ env.TEST_FILE }}
          timeout: ${{ env.RUN_DURATION }}
          serial-log-file: wokwi-serial.log

      - name: Upload Wokwi serial log
        if: always() && hashFiles('wokwi-serial.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-serial-${{ env.EXAMPLE_NAME }}
          path: wokwi-serial.log

      - name: Upload transformed scenario
        if: always() && env.TEST_FILE != ''
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-scenario-${{ env.EXAMPLE_NAME }}
          path: ${{ env.TEST_FILE }}
